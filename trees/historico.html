<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Histórico — Trees Coliving</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles-base.css">
  <style>
    :root {
      --color-primary: #2D5016;
      --color-primary-light: #4A7A2E;
      --color-bg: #F5F0E8;
      --color-card-bg: #FFFFFF;
      --color-text: #1A1A1A;
      --color-text-muted: #6B6B6B;
      --color-positive: #2D5016;
      --color-negative: #B91C1C;
      --color-meta: #1877F2;
      --color-google: #34A853;
      --color-hubspot: #FF7A59;
      --font-family: 'Nunito', sans-serif;
      --border-radius: 16px;
    }

    /* ── Nav Bar ── */
    .page-nav {
      background: var(--color-card-bg);
      border-bottom: 3px solid var(--color-primary);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .nav-brand {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--color-primary);
      text-decoration: none;
      padding: 14px 20px 14px 0;
      margin-right: 8px;
      border-right: 2px solid #E5E7EB;
    }

    .nav-links { display: flex; align-items: center; gap: 0; flex: 1; }

    .nav-link {
      padding: 14px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-text-muted);
      text-decoration: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-link:hover { color: var(--color-text); }

    .nav-link.active {
      color: #5B6E4F;
      border-bottom-color: #5B6E4F;
      font-weight: 700;
    }

    .nav-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }

    .month-selector {
      padding: 6px 12px;
      border: 2px solid var(--color-primary);
      border-radius: 8px;
      background: var(--color-card-bg);
      color: var(--color-text);
      font-family: var(--font-family);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    #date-range {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      font-weight: 500;
    }

    .btn-export {
      padding: 6px 16px;
      background: var(--color-primary);
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-family: var(--font-family);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-export:hover { opacity: 0.85; }
    .btn-export:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Page Header ── */
    .page-header {
      background: #5B6E4F;
      color: #FFFFFF;
      padding: 20px 24px;
      border-radius: var(--border-radius);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-header-icon { font-size: 1.4rem; font-weight: 800; }
    .page-header-title { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

    /* ── Tables ── */
    .table-section { margin-top: 8px; }
    .table-section + .table-section { margin-top: 36px; }

    .table-section h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .table-section h4 .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge.google { background: var(--color-google); }
    .badge.meta { background: var(--color-meta); }

    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .data-table th { color: #FFFFFF; padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; user-select: none; font-size: 0.78rem; }
    .data-table th:hover { opacity: 0.9; }
    .data-table td { padding: 9px 12px; border-bottom: 1px solid #E5E7EB; white-space: nowrap; }
    .data-table tbody tr:hover { background: rgba(0,0,0,0.02); }
    .data-table tbody tr:nth-child(even) { background: rgba(0,0,0,0.015); }

    .data-table.google th { background: var(--color-google); }
    .data-table.meta th { background: var(--color-meta); }

    /* ── Inline Bars ── */
    .inline-bar-wrapper { display: flex; align-items: center; gap: 8px; min-width: 120px; }
    .inline-bar { display: inline-block; height: 16px; border-radius: 3px; min-width: 2px; transition: width 0.3s ease; }
    .inline-value { font-weight: 600; font-size: 0.8rem; white-space: nowrap; }

    /* ── Footer ── */
    .dashboard-footer {
      margin-top: 40px;
      padding: 20px 0;
      border-top: 2px solid #E5E7EB;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .dashboard-wrapper { padding: 16px; }
      .page-nav { padding: 0 16px; flex-wrap: wrap; }
      .nav-controls { width: 100%; justify-content: flex-end; padding-bottom: 8px; }
    }
    @media (max-width: 480px) { .nav-links { flex-wrap: wrap; } }

    /* ── PDF ── */
    .pdf-mode { width: 1200px !important; max-width: none !important; }
    .pdf-mode .no-print { display: none !important; }
    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>
  <nav class="page-nav no-print">
    <a href="index.html" class="nav-brand"><img src="../assets/trees-logo.png" alt="Trees Coliving" style="height:32px;vertical-align:middle;margin-right:8px">Trees Coliving</a>
    <div class="nav-links">
      <a href="google.html" class="nav-link">Google Ads</a>
      <a href="meta.html" class="nav-link">Meta Ads</a>
      <a href="historico.html" class="nav-link active">Histórico</a>
      <a href="hubspot.html" class="nav-link">HubSpot</a>
    </div>
    <div class="nav-controls">
      <select id="month-selector" class="month-selector"></select>
      <span id="date-range"></span>
      <button id="btn-export-pdf" class="btn-export">PDF</button>
    </div>
  </nav>

  <div class="dashboard-wrapper" id="dashboard-content">
    <div class="page-header">
      <span class="page-header-icon">&#9776;</span>
      <span class="page-header-title">Histórico</span>
    </div>

    <div class="table-section">
      <h4>Histórico Mensual <span class="badge google">Google Ads</span></h4>
      <div class="table-wrapper" id="table-google-history"></div>
    </div>

    <div class="table-section">
      <h4>Histórico Mensual <span class="badge meta">Meta Ads</span></h4>
      <div class="table-wrapper" id="table-meta-history"></div>
    </div>

    <footer class="dashboard-footer">
      <span id="last-updated"></span> &middot; Datos actualizados diariamente
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script type="module">
    import { initDashboard, renderHistoricalTable } from '../shared/dashboard-v2.js';

    const STORAGE_KEY = 'trees_selected_month';

    function renderHistorico(data) {
      renderHistoricalTable('table-google-history', data.google_ads.monthly_history, {
        barColumns: ['leads', 'cpl'],
        barColors: { leads: '#34A853', cpl: '#D97706' }
      });

      renderHistoricalTable('table-meta-history', data.meta_ads.monthly_history, {
        barColumns: ['leads', 'cpl'],
        barColors: { leads: '#1877F2', cpl: '#D97706' }
      });

      // Apply table color classes
      const googleTable = document.querySelector('#table-google-history .data-table');
      if (googleTable) googleTable.classList.add('google');
      const metaTable = document.querySelector('#table-meta-history .data-table');
      if (metaTable) metaTable.classList.add('meta');
    }

    const urlParams = new URLSearchParams(window.location.search);
    const urlMonth = urlParams.get('month');
    const storedMonth = localStorage.getItem(STORAGE_KEY);

    initDashboard({
      clientId: 'trees',
      clientName: 'Trees Coliving',
      dataBasePath: '../data/trees',
      onDataLoaded: renderHistorico
    }).then(() => {
      const selector = document.getElementById('month-selector');
      if (selector) {
        const preferred = urlMonth || storedMonth;
        if (preferred && [...selector.options].some(o => o.value === preferred)) {
          selector.value = preferred;
          selector.dispatchEvent(new Event('change'));
        }
        selector.addEventListener('change', () => {
          localStorage.setItem(STORAGE_KEY, selector.value);
        });
      }
    });
  </script>
</body>
</html>
