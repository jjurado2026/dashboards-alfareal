<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Harmonices — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #143B48;
      --color-primary-light: #1E5A6B;
      --color-bg: #FFFFFF;
      --color-card-bg: #F8F9FA;
      --color-text: #1A1A1A;
      --color-text-muted: #6B7280;
      --color-border: #E5E7EB;
      --font-family: 'Montserrat', sans-serif;
      --border-radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .landing {
      text-align: center;
      padding: 60px 32px;
      max-width: 720px;
    }

    .landing-title {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .landing-subtitle {
      font-size: 1rem;
      color: var(--color-text-muted);
      margin-bottom: 48px;
      font-weight: 500;
    }

    .nav-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .nav-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      padding: 36px 24px;
      text-decoration: none;
      color: var(--color-text);
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
    }

    .nav-card:hover {
      box-shadow: 0 4px 16px rgba(20, 59, 72, 0.12);
      transform: translateY(-2px);
      border-color: var(--color-primary);
    }

    .nav-card-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
    }

    .nav-card-label {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    .nav-card-desc {
      font-size: 0.82rem;
      color: var(--color-text-muted);
      line-height: 1.4;
    }

    @media (max-width: 560px) {
      .nav-cards { grid-template-columns: 1fr; }
      .landing-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="landing">
    <h1 class="landing-title"><img src="../assets/harmonices-logo.png" alt="Harmonices" style="height:48px;vertical-align:middle;margin-right:12px">Harmonices</h1>
    <p class="landing-subtitle">Dashboard de Publicidad Digital</p>

    <div class="nav-cards">
      <a href="google.html" class="nav-card">
        <div class="nav-card-icon" style="background:#34A853;">G</div>
        <div class="nav-card-label">Google Ads</div>
        <div class="nav-card-desc">KPIs, rendimiento diario, campañas y keywords</div>
      </a>
      <a href="meta.html" class="nav-card">
        <div class="nav-card-icon" style="background:#1877F2;">M</div>
        <div class="nav-card-label">Meta Ads</div>
        <div class="nav-card-desc">KPIs, rendimiento diario, campañas y creatividades</div>
      </a>
      <a href="historico.html" class="nav-card">
        <div class="nav-card-icon" style="background:#143B48;">H</div>
        <div class="nav-card-label">Histórico</div>
        <div class="nav-card-desc">Evolución mensual de Google Ads y Meta Ads</div>
      </a>
      <a href="hubspot.html" class="nav-card">
        <div class="nav-card-icon" style="background:#F97316;">HS</div>
        <div class="nav-card-label">HubSpot</div>
        <div class="nav-card-desc">Pipeline, negocios, visitas y leads por etapa</div>
      </a>
    </div>
  </div>

</body>
</html>
