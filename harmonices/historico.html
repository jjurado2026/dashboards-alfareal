<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Histórico — Harmonices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles-base.css">
  <style>
    :root {
      --color-primary: #143B48;
      --color-primary-light: #1E5A6B;
      --color-bg: #FFFFFF;
      --color-card-bg: #F8F9FA;
      --color-text: #1A1A1A;
      --color-text-muted: #6B7280;
      --color-positive: #0D6E3F;
      --color-negative: #B91C1C;
      --color-google: #34A853;
      --color-meta: #1877F2;
      --color-border: #E5E7EB;
      --font-family: 'Montserrat', sans-serif;
      --border-radius: 8px;
    }

    .kpi-card { border: 1px solid var(--color-border); box-shadow: none; }
    .chart-card { border: 1px solid var(--color-border); box-shadow: none; }

    /* Nav bar */
    .page-nav {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 32px; background: var(--color-primary); color: #fff;
      font-family: var(--font-family); flex-wrap: wrap;
    }
    .nav-brand { font-size: 1.1rem; font-weight: 800; color: #fff; text-decoration: none; margin-right: 24px; }
    .nav-links { display: flex; gap: 4px; flex: 1; }
    .nav-link {
      padding: 6px 16px; border-radius: var(--border-radius);
      color: rgba(255,255,255,0.75); text-decoration: none;
      font-size: 0.85rem; font-weight: 600; transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-link.active { background: rgba(255,255,255,0.18); color: #fff; }
    .nav-controls { display: flex; align-items: center; gap: 10px; }
    .nav-controls .month-selector {
      padding: 5px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: var(--border-radius);
      background: rgba(255,255,255,0.1); color: #fff; font-family: var(--font-family); font-size: 0.82rem; cursor: pointer;
    }
    .nav-controls .month-selector option { color: #1A1A1A; background: #fff; }
    .nav-controls .btn-export {
      padding: 5px 14px; background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: var(--border-radius);
      font-family: var(--font-family); font-size: 0.82rem; font-weight: 600; cursor: pointer;
    }
    .nav-controls .btn-export:hover { background: rgba(255,255,255,0.25); }

    .section-divider {
      margin: 48px 0 32px; padding: 14px 0; border-bottom: 2px solid var(--color-primary);
      display: flex; align-items: center; gap: 10px;
    }
    .section-divider h2 { font-size: 1.15rem; font-weight: 700; color: var(--color-primary); letter-spacing: 0.5px; text-transform: uppercase; }
    .section-divider .section-icon { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    .date-range-badge {
      font-size: 0.78rem; color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 4px; font-weight: 500;
    }

    /* Table styling */
    .table-section { margin-top: 8px; }
    .table-section + .table-section { margin-top: 36px; }

    .table-section h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .table-section h4 .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge.google { background: var(--color-google); }
    .badge.meta { background: var(--color-meta); }

    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .data-table th { color: #FFFFFF; padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; user-select: none; font-size: 0.78rem; }
    .data-table th:hover { opacity: 0.9; }
    .data-table td { padding: 9px 12px; border-bottom: 1px solid #E5E7EB; white-space: nowrap; }
    .data-table tbody tr:hover { background: rgba(0,0,0,0.02); }
    .data-table tbody tr:nth-child(even) { background: rgba(0,0,0,0.015); }

    .data-table.google th { background: var(--color-google); }
    .data-table.meta th { background: var(--color-meta); }

    /* Inline bars for historical */
    .inline-bar-wrapper { display: flex; align-items: center; gap: 8px; min-width: 120px; }
    .inline-bar { display: inline-block; height: 16px; border-radius: 3px; min-width: 2px; transition: width 0.3s ease; }
    .inline-value { font-weight: 600; font-size: 0.8rem; white-space: nowrap; }

    /* Footer */
    .dashboard-footer {
      margin-top: 40px;
      padding: 20px 0;
      border-top: 2px solid #E5E7EB;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      text-align: center;
    }

    @media (max-width: 768px) {
      .page-nav {
        flex-direction: column;
        align-items: stretch;
        padding: 12px 16px;
      }
      .nav-brand {
        text-align: center;
        margin-bottom: 8px;
        margin-right: 0;
      }
      .nav-links {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 4px;
      }
      .nav-link {
        padding: 8px 12px;
        font-size: 0.8rem;
      }
      .nav-controls {
        display: flex;
        justify-content: center;
        gap: 8px;
      }
      .month-selector {
        font-size: 0.8rem;
        padding: 6px 10px;
      }
      .btn-export {
        font-size: 0.8rem;
        padding: 6px 14px;
      }
    }

    /* PDF */
    .pdf-mode { width: 1200px !important; max-width: none !important; }
    .pdf-mode .no-print { display: none !important; }
    @media print { .page-nav { display: none; } }
  </style>
</head>
<body>

  <nav class="page-nav">
    <a href="../" class="nav-home" title="Volver al inicio" style="color:rgba(255,255,255,0.7);text-decoration:none;font-size:1.2rem;margin-right:10px;"><a href="../" class="nav-home" title="Volver al inicio" style="color:rgba(255,255,255,0.7);text-decoration:none;font-size:1.1rem;margin-right:8px;transition:color 0.15s;"><a href="index.html" class="nav-brand">#8962;</a><a href="index.html" class="nav-brand">#8592;</a><a href="index.html" class="nav-brand"><img src="../assets/harmonices-logo.png" alt="Harmonices" style="height:32px;vertical-align:middle;margin-right:8px">Harmonices</a>
    <div class="nav-links">
      <a href="google.html" class="nav-link">Google Ads</a>
      <a href="meta.html" class="nav-link">Meta Ads</a>
      <a href="historico.html" class="nav-link active">Histórico</a>
      <a href="hubspot.html" class="nav-link">HubSpot</a>
    </div>
    <div class="nav-controls">
      <span class="date-range-badge" id="date-range"></span>
      <select id="month-selector" class="month-selector"></select>
      
    </div>
  </nav>

  <div class="dashboard-wrapper" id="dashboard-content">

    <div class="section-divider" style="margin-top:24px;">
      <span class="section-icon" style="background: var(--color-primary);"></span>
      <h2>Histórico</h2>
    </div>

    <div class="table-section">
      <h4>Histórico Mensual <span class="badge google">Google Ads</span></h4>
      <div class="table-wrapper" id="table-google-history"></div>
    </div>

    <div class="table-section">
      <h4>Histórico Mensual <span class="badge meta">Meta Ads</span></h4>
      <div class="table-wrapper" id="table-meta-history"></div>
    </div>

    <footer class="dashboard-footer">
      <span id="last-updated"></span> · Datos actualizados diariamente
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script type="module">
    import { initDashboard, renderHistoricalTable } from '../shared/dashboard-v2.js';

    const MONTH_KEY = 'harmonices_selected_month';

    function renderHistorico(data) {
      if (data.google_ads && data.google_ads.monthly_history) {
        renderHistoricalTable('table-google-history', data.google_ads.monthly_history, {
          barColumns: ['leads', 'cpl'],
          barColors: { leads: '#34A853', cpl: '#D97706' }
        });
        const googleTable = document.querySelector('#table-google-history .data-table');
        if (googleTable) googleTable.classList.add('google');
      }

      if (data.meta_ads && data.meta_ads.monthly_history) {
        renderHistoricalTable('table-meta-history', data.meta_ads.monthly_history, {
          barColumns: ['leads', 'cpl'],
          barColors: { leads: '#1877F2', cpl: '#D97706' }
        });
        const metaTable = document.querySelector('#table-meta-history .data-table');
        if (metaTable) metaTable.classList.add('meta');
      }
    }

    initDashboard({
      clientId: 'harmonices',
      clientName: 'Harmonices',
      dataBasePath: '../data/harmonices',
      onDataLoaded: renderHistorico
    }).then(() => {
      const selector = document.getElementById('month-selector');
      if (selector) {
        const saved = localStorage.getItem(MONTH_KEY);
        if (saved && [...selector.options].some(o => o.value === saved)) {
          selector.value = saved;
          selector.dispatchEvent(new Event('change'));
        }
        selector.addEventListener('change', () => {
          localStorage.setItem(MONTH_KEY, selector.value);
        });
      }
    });
  </script>
<script src="../shared/auth.js"></script>
</body>
</html>
