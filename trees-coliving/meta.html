<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Meta Ads — Trees Coliving</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles-base.css">
  <style>
    :root {
      --color-primary: #2D5016;
      --color-primary-light: #4A7A2E;
      --color-bg: #F5F0E8;
      --color-card-bg: #FFFFFF;
      --color-text: #1A1A1A;
      --color-text-muted: #6B6B6B;
      --color-positive: #2D5016;
      --color-negative: #B91C1C;
      --color-meta: #1877F2;
      --color-google: #34A853;
      --color-hubspot: #FF7A59;
      --color-border: #E5E7EB;
      --font-family: 'Nunito', sans-serif;
      --border-radius: 16px;
    }

    /* Trees overrides */
    .kpi-card { border: 1px solid var(--color-border); box-shadow: none; }
    .kpi-card:hover { box-shadow: 0 2px 8px rgba(45,80,22,0.08); transform: translateY(-1px); }
    .chart-card { border: 1px solid var(--color-border); box-shadow: none; }

    /* Nav bar */
    .page-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 32px;
      background: var(--color-primary);
      color: #fff;
      font-family: var(--font-family);
      flex-wrap: wrap;
    }
    .nav-brand {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      margin-right: 24px;
      letter-spacing: -0.3px;
    }
    .nav-links { display: flex; gap: 4px; flex: 1; }
    .nav-link {
      padding: 6px 16px;
      border-radius: var(--border-radius);
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-link.active { background: rgba(255,255,255,0.18); color: #fff; }
    .nav-controls { display: flex; align-items: center; gap: 10px; }
    .nav-controls .month-selector {
      padding: 5px 12px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: var(--border-radius);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-family: var(--font-family);
      font-size: 0.82rem;
      cursor: pointer;
    }
    .nav-controls .month-selector option { color: #1A1A1A; background: #fff; }

    /* 7-card KPI grid */
    .kpi-grid-7 {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 14px;
    }
    @media (max-width: 1200px) { .kpi-grid-7 { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 768px) {
      .page-nav {
        flex-direction: column;
        align-items: stretch;
        padding: 12px 16px;
      }
      .nav-brand {
        text-align: center;
        margin-bottom: 8px;
        margin-right: 0;
      }
      .nav-links {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 4px;
      }
      .nav-link {
        padding: 8px 12px;
        font-size: 0.8rem;
      }
      .nav-controls {
        display: flex;
        justify-content: center;
        gap: 8px;
      }
      .month-selector {
        font-size: 0.8rem;
        padding: 6px 10px;
      }
      .kpi-grid-7 { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 480px) {
      .kpi-grid-7 { grid-template-columns: 1fr !important; }
    }

    /* Section divider */
    .section-divider {
      margin: 48px 0 32px;
      padding: 14px 0;
      border-bottom: 2px solid var(--color-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-divider h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .section-divider .section-icon {
      width: 10px; height: 10px; border-radius: 50%; display: inline-block;
    }

    /* Date range badge */
    .date-range-badge {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 4px;
      font-weight: 500;
    }

    /* ── Charts ── */
    .chart-row { display: grid; gap: 20px; margin-bottom: 24px; }
    .chart-row.cols-1 { grid-template-columns: 1fr; }

    .chart-box {
      background: var(--color-card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .chart-box h4 { font-size: 0.85rem; font-weight: 700; color: var(--color-meta); margin-bottom: 12px; }

    .chart-container { position: relative; height: 300px; }

    /* ── Tables ── */
    .table-section { margin-top: 28px; }
    .table-section h4 { font-size: 0.85rem; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 12px; }

    .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .data-table th { background: var(--color-meta); color: #FFFFFF; padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; user-select: none; font-size: 0.78rem; }
    .data-table th:hover { opacity: 0.9; }
    .data-table td { padding: 9px 12px; border-bottom: 1px solid #E5E7EB; white-space: nowrap; }
    .data-table tbody tr:hover { background: rgba(0,0,0,0.02); }
    .data-table tbody tr:nth-child(even) { background: rgba(0,0,0,0.015); }

    /* ── Platform Pill ── */
    .platform-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .platform-pill.facebook { background: #1877F2; color: #FFFFFF; }
    .platform-pill.instagram { background: linear-gradient(45deg, #F58529, #DD2A7B, #8134AF); color: #FFFFFF; }
    .platform-pill.messenger { background: #00B2FF; color: #FFFFFF; }
    .platform-pill.audience_network { background: #4267B2; color: #FFFFFF; }
    .platform-pill.default { background: #E5E7EB; color: var(--color-text); }

    /* ── Creative Thumbnail ── */
    .creative-thumb {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--color-bg);
    }

    .creative-thumb-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
      font-size: 0.65rem;
      text-align: center;
    }

    /* ── Footer ── */
    .dashboard-footer {
      margin-top: 40px;
      padding: 20px 0;
      border-top: 2px solid #E5E7EB;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      text-align: center;
    }

    @media print {
      .page-nav { display: none; }
      .no-print { display: none !important; }
      .tab-content { display: block !important; }
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="page-nav">
    <a href="../" class="nav-home" title="Volver al inicio" style="color:rgba(255,255,255,0.7);text-decoration:none;font-size:1.1rem;margin-right:8px;transition:color 0.15s;"><a href="index.html" class="nav-brand">#8962;</a><a href="index.html" class="nav-brand"><img src="../assets/trees-logo.png" alt="Trees Coliving" style="height:32px;vertical-align:middle;margin-right:8px">Trees Coliving</a>
    <div class="nav-links">
      <a href="google.html" class="nav-link">Google Ads</a>
      <a href="meta.html" class="nav-link active">Meta Ads</a>
      <a href="historico.html" class="nav-link">Histórico</a>
      <a href="hubspot.html" class="nav-link">HubSpot</a>
    </div>
    <div class="nav-controls">
      <span class="date-range-badge" id="date-range"></span>
      <select id="month-selector" class="month-selector"></select>
    </div>
  </nav>

  <div class="dashboard-wrapper" id="dashboard-content">

    <div class="section-divider" style="margin-top:24px;">
      <span class="section-icon" style="background: #1877F2;"></span>
      <h2>Meta Ads — España</h2>
    </div>

    <section class="kpi-section">
      <div class="kpi-grid-7" id="meta-kpis"></div>
    </section>

    <div class="chart-row cols-1">
      <div class="chart-box">
        <h4>Leads y CPL Diarios</h4>
        <div class="chart-container"><canvas id="chart-meta-daily"></canvas></div>
      </div>
    </div>

    <section class="tabs" style="margin-bottom:28px;">
      <div class="tab-buttons no-print">
        <button class="tab-btn active" data-tab="tab-meta-campaigns" data-group="meta">Campañas</button>
        <button class="tab-btn" data-tab="tab-meta-platforms" data-group="meta">Plataformas</button>
        <button class="tab-btn" data-tab="tab-meta-creatives" data-group="meta">Creatividades</button>
      </div>
      <div id="tab-meta-campaigns" class="tab-content active" data-group="meta">
        <div class="table-wrapper" id="table-meta-campaigns"></div>
      </div>
      <div id="tab-meta-platforms" class="tab-content" data-group="meta">
        <div class="table-wrapper" id="table-meta-platforms"></div>
      </div>
      <div id="tab-meta-creatives" class="tab-content" data-group="meta">
        <div class="table-wrapper" id="table-meta-creatives"></div>
      </div>
    </section>

    <footer class="dashboard-footer">
      <span id="last-updated"></span> &middot; Datos actualizados diariamente
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script type="module">
    import { initDashboard, renderKpiCards, renderSortableTable } from '../shared/dashboard-v2.js';
    import { createDailyCombo } from '../shared/charts-v2.js';

    const STORAGE_KEY = 'trees_selected_month';

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        document.querySelectorAll(`.tab-btn[data-group="${group}"]`).forEach(b => b.classList.remove('active'));
        document.querySelectorAll(`.tab-content[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab)?.classList.add('active');
      });
    });

    function platformPill(platform) {
      const p = (platform || '').toLowerCase().replace(/\s+/g, '_');
      const cls = ['facebook', 'instagram', 'messenger', 'audience_network'].includes(p) ? p : 'default';
      return `<span class="platform-pill ${cls}">${platform || '—'}</span>`;
    }

    const campaignCols = [
      { key: 'name', label: 'Campaña', unit: 'text' },
      { key: 'impresiones', label: 'Impresiones', unit: 'count', align: 'right' },
      { key: 'clics', label: 'Clics', unit: 'count', align: 'right' },
      { key: 'ctr', label: 'CTR', unit: 'pct', align: 'right' },
      { key: 'cpc', label: 'CPC', unit: 'eur', align: 'right' },
      { key: 'leads', label: 'Leads', unit: 'count', align: 'right', defaultDesc: true },
      { key: 'cpl', label: 'CPL', unit: 'eur', align: 'right' },
      { key: 'inversion', label: 'Inversión', unit: 'eur', align: 'right' }
    ];

    function renderMeta(data) {
      const m = data.meta_ads;

      renderKpiCards('meta-kpis', m.kpis);

      createDailyCombo('chart-meta-daily', m.daily, {
        barColor: '#1877F2',
        lineColor: '#6B6B6B'
      });

      renderSortableTable('table-meta-campaigns', campaignCols, m.campaigns, { defaultSortCol: 'leads', defaultSortAsc: false });

      renderSortableTable('table-meta-platforms', [
        { key: 'campaign', label: 'Campaña', unit: 'text' },
        {
          key: 'platform', label: 'Plataforma', unit: 'text',
          render: row => platformPill(row.platform)
        },
        { key: 'impresiones', label: 'Impresiones', unit: 'count', align: 'right' },
        { key: 'clics', label: 'Clics', unit: 'count', align: 'right' },
        { key: 'ctr', label: 'CTR', unit: 'pct', align: 'right' },
        { key: 'cpc', label: 'CPC', unit: 'eur', align: 'right' },
        { key: 'leads', label: 'Leads', unit: 'count', align: 'right', defaultDesc: true },
        { key: 'cpl', label: 'CPL', unit: 'eur', align: 'right' },
        { key: 'inversion', label: 'Inversión', unit: 'eur', align: 'right' }
      ], m.campaigns_by_platform, { defaultSortCol: 'leads', defaultSortAsc: false });

      renderSortableTable('table-meta-creatives', [
        { key: 'name', label: 'Ad Name', unit: 'text' },
        {
          key: 'image_url', label: 'Thumbnail', unit: 'text',
          render: row => {
            if (row.image_url) {
              return `<img src="${row.image_url}" alt="${row.name}" class="creative-thumb" loading="lazy" onerror="this.outerHTML='<div class=\\'creative-thumb-placeholder\\'>Sin imagen</div>'">`;
            }
            return '<div class="creative-thumb-placeholder">Sin imagen</div>';
          }
        },
        { key: 'impresiones', label: 'Impresiones', unit: 'count', align: 'right' },
        { key: 'clics', label: 'Clics', unit: 'count', align: 'right' },
        { key: 'ctr', label: 'CTR', unit: 'pct', align: 'right' },
        { key: 'cpc', label: 'CPC', unit: 'eur', align: 'right' },
        { key: 'leads', label: 'Leads', unit: 'count', align: 'right', defaultDesc: true },
        { key: 'cpl', label: 'CPL', unit: 'eur', align: 'right' },
        { key: 'inversion', label: 'Inversión', unit: 'eur', align: 'right' }
      ], m.creatives, { defaultSortCol: 'leads', defaultSortAsc: false });
    }

    const urlParams = new URLSearchParams(window.location.search);
    const urlMonth = urlParams.get('month');
    const storedMonth = localStorage.getItem(STORAGE_KEY);

    initDashboard({
      clientId: 'trees',
      clientName: 'Trees Coliving',
      dataBasePath: '../data/trees',
      onDataLoaded: renderMeta
    }).then(() => {
      const selector = document.getElementById('month-selector');
      if (selector) {
        const preferred = urlMonth || storedMonth;
        if (preferred && [...selector.options].some(o => o.value === preferred)) {
          selector.value = preferred;
          selector.dispatchEvent(new Event('change'));
        }
        selector.addEventListener('change', () => {
          localStorage.setItem(STORAGE_KEY, selector.value);
        });
      }
    });
  </script>
<script src="../shared/auth.js"></script>
</body>
</html>
